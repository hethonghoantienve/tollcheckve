<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tool Báo Giá Vé Máy Bay</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 20px auto;
            padding: 16px;
            width: 440px;
            box-sizing: border-box;
            background-color: #f4f6f9;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        h2 {
            color: #1a73e8;
            margin: 0 0 12px 0;
            text-align: center;
            font-size: 18px;
        }
        .upload-box {
            border: 2px dashed #1a73e8;
            background: #fff;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 12px;
            font-size: 13.5px;
            color: #1a73e8;
            font-weight: bold;
            transition: background 0.2s;
        }
        .upload-box:hover {
            background: #e8f0fe;
        }
        .group-title {
            font-size: 12.5px;
            font-weight: bold;
            color: #444;
            margin-bottom: 4px;
        }
        .btn-group {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }
        .btn-group label {
            flex: 1;
        }
        .btn-group input {
            display: none;
        }
        .btn-select {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border: 1.5px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: #444;
            background: #fff;
            text-align: center;
            user-select: none;
        }
        .btn-group input:checked + .btn-select {
            border-color: #1a73e8;
            background: #e8f0fe;
            color: #1a73e8;
        }
        .input-box {
            width: 100%;
            padding: 9px;
            border: 1.5px solid #e0e0e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14.5px;
            font-weight: bold;
            outline: none;
            margin-bottom: 12px;
        }
        .input-box:focus {
            border-color: #1a73e8;
        }
        .pax-container {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }
        .pax-box {
            flex: 1;
            text-align: center;
        }
        .pax-box input {
            text-align: center;
            margin-bottom: 0;
        }
        textarea {
            width: 100%;
            height: 160px; /* Tăng thêm không gian hiển thị tin nhắn chi tiết */
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fdfdfd;
            resize: none;
            font-size: 13.5px;
            line-height: 1.45;
            padding: 8px;
            box-sizing: border-box;
            outline: none;
        }
        .btn-copy {
            width: 100%;
            background: #1a73e8;
            color: white;
            border: none;
            padding: 11px;
            border-radius: 6px;
            font-size: 14.5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 6px;
            margin-bottom: 14px;
        }
        .btn-copy.copied {
            background: #34a853;
        }
        
        .ba-container {
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .ba-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 8px;
        }
        .btn-ba {
            background: #f1f3f4;
            border: 1px solid #dadce0;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            color: #3c4043;
            cursor: pointer;
            text-align: center;
        }
        .btn-ba:hover {
            background: #e8eaed;
        }
        .toast-msg {
            font-size: 12px;
            color: #34a853;
            text-align: center;
            font-weight: bold;
            height: 16px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div>
    <h2>✈️ Tool Báo Giá Vé Máy Bay</h2>
    
    <div class="upload-box" id="dropZone">
        <span id="uploadStatus">📸 Click chọn ảnh hoặc Ctrl+V để dán ảnh hệ thống</span>
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
    </div>

    <div class="group-title">Loại vé:</div>
    <div class="btn-group">
        <label>
            <input type="radio" name="ticketType" id="typeOneWay" value="mot_chieu" checked>
            <div class="btn-select">Một Chiều</div>
        </label>
        <label>
            <input type="radio" name="ticketType" id="typeRoundTrip" value="khu_hoi">
            <div class="btn-select">Khứ Hồi</div>
        </label>
    </div>

    <div class="group-title">Hãng bay (Hành lý):</div>
    <div class="btn-group">
        <label>
            <input type="radio" name="airlineType" id="airlineNone" value="none" checked>
            <div class="btn-select">Bỏ chọn</div>
        </label>
        <label>
            <input type="radio" name="airlineType" id="airlineVNA" value="vna">
            <div class="btn-select">VNA</div>
        </label>
        <label>
            <input type="radio" name="airlineType" id="airlineVJ" value="vj">
            <div class="btn-select">Vietjet</div>
        </label>
    </div>

    <div class="group-title">Giá gốc hệ thống (1 Người lớn):</div>
    <input type="number" id="rawPrice" class="input-box" placeholder="Nhập giá hoặc để ảnh tự điền..." autofocus>

    <div style="display: flex; gap: 8px;">
        <div style="flex: 1;">
            <div class="group-title">Trừ tiền:</div>
            <input type="number" id="minusAmount" class="input-box" value="0">
        </div>
        <div style="flex: 1;">
            <div class="group-title">Giảm (%):</div>
            <input type="number" id="minusPercent" class="input-box" value="35">
        </div>
    </div>

    <div class="group-title">Số lượng hành khách:</div>
    <div class="pax-container">
        <div class="pax-box">
            <div class="group-title" style="font-weight: normal; font-size: 11px;">Người lớn</div>
            <input type="number" id="paxAdult" class="input-box" value="1" min="1">
        </div>
        <div class="pax-box">
            <div class="group-title" style="font-weight: normal; font-size: 11px;">Trẻ em (2-12t)</div>
            <input type="number" id="paxChild" class="input-box" value="0" min="0">
        </div>
        <div class="pax-box">
            <div class="group-title" style="font-weight: normal; font-size: 11px;">Em bé (&lt;2t)</div>
            <input type="number" id="paxInfant" class="input-box" value="0" min="0">
        </div>
    </div>

    <div class="group-title">Tin nhắn gửi khách:</div>
    <textarea id="templateOutput" readonly placeholder="Tin nhắn tự động tạo tại đây..."></textarea>
    <button class="btn-copy" id="copyBtn">Sao Chép Tin Nhắn Báo Giá</button>

    <div class="ba-container">
        <div class="group-title" style="color: #d93025; text-align: center; margin-bottom: 6px;">🎯 THẢ BẢ TIN NHẮN NHANH (BẤM LÀ COPY)</div>
        <div class="ba-grid">
            <button class="btn-ba" onclick="copyBa(1)">⏳ Giữ chỗ miễn phí</button>
            <button class="btn-ba" onclick="copyBa(2)">🔥 Giục khách chốt</button>
            <button class="btn-ba" onclick="copyBa(3)">❌ Báo sắp hết vé</button>
            <button class="btn-ba" onclick="copyBa(4)">📉 Vé đang xuống</button>
        </div>
        <textarea id="baOutput" readonly placeholder="Nội dung thả bả bấm chọn sẽ hiện ở đây..." style="height: 70px; font-size: 12.5px;"></textarea>
        <div class="toast-msg" id="toastMsg"></div>
    </div>
</div>

<script>
const mauThaBa = {
    1: "Dạ em đang thấy giá này tốt nhất trong tuần, em hỗ trợ giữ chỗ MIỄN PHÍ cho mình trước để khóa giá đẹp này lại nha anh/chị? Lát mình chốt sau đỡ bị tăng giá ạ!",
    2: "Anh/chị ơi, mã giảm giá đại lý của chuyến này hệ thống sắp hết hạn áp dụng rồi ạ. Mình chốt luôn bây giờ để em xuất vé giữ nguyên giá rẻ này cho mình nhé!",
    3: "Chuyến này hiện tại hệ thống chỉ còn đúng vài ghế giá rẻ thôi ạ, mình chốt sớm không hệ thống nhảy lên hạng thương gia thì phí lắm anh/chị ơi!",
    4: "Hệ thống bên em vừa báo chuyến này đang có đợt nhả vé giá tốt đột xuất, rẻ hơn lúc nãy khá nhiều. Anh/chị chốt giữ chỗ luôn kẻo người khác đặt mất nha!"
};

function copyBa(id) {
    const txt = mauThaBa[id];
    document.getElementById('baOutput').value = txt;
    
    navigator.clipboard.writeText(txt).then(() => {
        const toast = document.getElementById('toastMsg');
        toast.innerText = "✓ Đã tự động copy tin nhắn thả bả!";
        setTimeout(() => { toast.innerText = ""; }, 2000);
    });
}

document.addEventListener('DOMContentLoaded', function () {
    const rawPrice = document.getElementById('rawPrice');
    const minusAmount = document.getElementById('minusAmount');
    const minusPercent = document.getElementById('minusPercent');
    const typeOneWay = document.getElementById('typeOneWay');
    const typeRoundTrip = document.getElementById('typeRoundTrip');
    const paxAdult = document.getElementById('paxAdult');
    const paxChild = document.getElementById('paxChild');
    const paxInfant = document.getElementById('paxInfant');
    const templateOutput = document.getElementById('templateOutput');
    const copyBtn = document.getElementById('copyBtn');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const uploadStatus = document.getElementById('uploadStatus');

    [rawPrice, minusAmount, minusPercent, paxAdult, paxChild, paxInfant].forEach(el => el.addEventListener('input', handleUpdate));
    [typeOneWay, typeRoundTrip].forEach(el => el.addEventListener('change', handleUpdate));
    document.querySelectorAll('input[name="airlineType"]').forEach(el => el.addEventListener('change', handleUpdate));
    copyBtn.addEventListener('click', copyText);

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => e.target.files.length && processImage(e.target.files[0]));
    
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = "#e8f0fe"; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.background = "#fff"; });
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.style.background = "#fff"; e.dataTransfer.files.length && processImage(e.dataTransfer.files[0]); });

    document.addEventListener('paste', function (e) {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let i in items) {
            if (items[i].kind === 'file' && items[i].type.indexOf('image/') !== -1) {
                processImage(items[i].getAsFile());
                break;
            }
        }
    });

    function processImage(file) {
        uploadStatus.innerText = "⏳ Đang quét dữ liệu ảnh...";
        uploadStatus.style.color = "#e67e22";

        const reader = new FileReader();
        reader.onload = function() {
            Tesseract.recognize(reader.result, 'eng')
            .then(({ data: { text } }) => {
                const txt = text.toLowerCase();
                
                if (txt.includes("vietnam") || txt.includes("vna") || txt.includes("vn ")) {
                    document.getElementById('airlineVNA').checked = true;
                } else if (txt.includes("vietjet") || txt.includes("vj ") || txt.includes("vjc")) {
                    document.getElementById('airlineVJ').checked = true;
                }

                const match = text.match(/(\d{1,3}[.,]\d{3}([.,]\d{3})*)/) || text.match(/\d{5,10}/);
                if (match && match[0]) {
                    rawPrice.value = match[0].replace(/[.,]/g, '');
                    uploadStatus.innerText = "✅ Quét ảnh thành công!";
                    uploadStatus.style.color = "#27ae60";
                    handleUpdate();
                } else {
                    uploadStatus.innerText = "❌ Không tìm thấy giá, vui lòng gõ tay!";
                    uploadStatus.style.color = "#c0392b";
                }
            })
            .catch(() => {
                uploadStatus.innerText = "❌ Lỗi đọc file ảnh!";
                uploadStatus.style.color = "#c0392b";
            });
        };
        reader.readAsDataURL(file);
    }

    function handleUpdate() {
        if (!rawPrice.value || isNaN(rawPrice.value) || rawPrice.value <= 0) {
            templateOutput.value = "";
            return;
        }

        copyBtn.innerText = "Sao Chép Tin Nhắn Báo Giá";
        copyBtn.classList.remove('copied');

        const original = parseFloat(rawPrice.value);
        const minusAmt = parseFloat(minusAmount.value) || 0;
        const discount = parseFloat(minusPercent.value) || 0;

        const numAdult = Math.max(1, parseInt(paxAdult.value) || 1);
        const numChild = Math.max(0, parseInt(paxChild.value) || 0);
        const numInfant = Math.max(0, parseInt(paxInfant.value) || 0);

        const ticketType = document.querySelector('input[name="ticketType"]:checked').value;
        const airlineType = document.querySelector('input[name="airlineType"]:checked').value;

        // Tính giá cơ bản sau khi trừ tiền mặt
        let basePrice = Math.max(0, original - minusAmt);
        
        // --- TÍNH TOÁN CHO TỪNG LOẠI VÉ KHÁCH HÀNG ---
        // 1. Người lớn
        let singleAdultPrice = Math.floor((basePrice * (1 - (discount / 100))) / 1000) * 1000;
        let totalAdult = singleAdultPrice * numAdult;

        // 2. Trẻ em (Giá sau giảm người lớn x 70%)
        let singleChildPrice = Math.floor((singleAdultPrice * 0.7) / 1000) * 1000;
        let totalChild = singleChildPrice * numChild;

        // 3. Em bé (Thuế phí cố định)
        let singleInfantPrice = (ticketType === "khu_hoi") ? 400000 : 200000;
        let totalInfant = singleInfantPrice * numInfant;

        // TỔNG TIỀN CUỐI CÙNG (SAU GIẢM)
        let totalAll = totalAdult + totalChild + totalInfant;

        // --- TÍNH TOÁN TỔNG GIÁ VÉ GỐC ĐỂ HIỂN THỊ ---
        let rawChildPrice = Math.floor((basePrice * 0.7) / 1000) * 1000; // Giá gốc trẻ em tương ứng 70%
        let totalRawPrice = (basePrice * numAdult) + (rawChildPrice * numChild) + (singleInfantPrice * numInfant);
        
        // Số tiền tiết kiệm được cho cả đoàn
        let totalSaved = Math.max(0, totalRawPrice - totalAll);

        // Định dạng số tiền hiển thị
        const formatter = new Intl.NumberFormat('en-US');
        const strTotalRaw = formatter.format(totalRawPrice) + "đ";
        const strTotalAll = formatter.format(totalAll) + "đ";
        const strTotalSaved = formatter.format(totalSaved) + "đ";
        const strSingleAdult = formatter.format(singleAdultPrice) + "đ";

        // Tạo text chi tiết số hành khách
        let paxDetailStr = `${numAdult} người lớn`;
        if (numChild > 0) paxDetailStr += `, ${numChild} trẻ em`;
        if (numInfant > 0) paxDetailStr += `, ${numInfant} em bé`;

        let baggage = "";
        if (airlineType === "vna") {
            baggage = "\n🧳 Hành lý: Đã bao gồm 10kg xách tay + 2 kiện ký gửi 23kg (Tổng 46kg).";
        } else if (airlineType === "vj") {
            baggage = "\n🧳 Hành lý: Đã bao gồm 7kg xách tay + 20kg ký gửi.";
        }

        const title = (ticketType === "khu_hoi") ? "Giá vé khứ hồi" : "Giá vé một chiều";

        // Chuỗi chi tiết giá từng người (nếu đoàn đông loại người)
        let breakdownStr = "";
        if (numChild > 0 || numInfant > 0) {
            breakdownStr = `\n(Chi tiết: Người lớn ${strSingleAdult}/vé`;
            if (numChild > 0) breakdownStr += ` | Trẻ em: ${formatter.format(singleChildPrice)}đ/vé`;
            if (numInfant > 0) breakdownStr += ` | Em bé: ${formatter.format(singleInfantPrice)}đ/vé`;
            breakdownStr += `)`;
        }

        // Xuất văn bản gửi khách hiển thị rõ GIÁ GỐC ban đầu
        templateOutput.value = `${title} (${paxDetailStr}):\n- Giá gốc trên hệ thống: ${strTotalRaw}.\n- Bên em áp mã giảm giá đại lý ${discount}%, tiết kiệm ngay cho mình được: ${strTotalSaved}.${breakdownStr}\n${baggage}\n\n💰 Tổng giá trọn gói thanh toán sau giảm: ${strTotalAll} (Cam kết không phát sinh chi phí).\n\nAnh/chị xem qua, cần chốt giữ chỗ luôn hay tư vấn gì thêm cứ nhắn em nha!`;
    }

    function copyText() {
        if (!templateOutput.value) return;
        templateOutput.select();
        navigator.clipboard.writeText(templateOutput.value).then(() => {
            copyBtn.innerText = "✓ Đã Sao Chép Báo Giá!";
            copyBtn.classList.add('copied');
        });
    }
});
</script>
</body>
</html>
